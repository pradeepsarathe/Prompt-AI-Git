name: CI — sanity checks

# R5: catches syntax errors and broken imports in Pages Functions before
# Cloudflare deploys them. Runs on every push and PR to the default branch.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check every Pages Function (ES modules)
        run: |
          set -e
          for f in $(find functions -name '*.js'); do
            echo "checking $f"
            # functions are ES modules — node --check needs the .mjs hint
            cp "$f" /tmp/check.mjs
            node --check /tmp/check.mjs
          done

      - name: Syntax-check client scripts
        run: |
          set -e
          for f in pai-*.js prompts-data.js sw.js; do
            [ -f "$f" ] || continue
            echo "checking $f"
            node --check "$f"
          done

      - name: Validate JSON files
        run: |
          set -e
          for f in tools.json manifest.webmanifest; do
            [ -f "$f" ] || continue
            echo "checking $f"
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('  ok')"
          done

      - name: Check function imports resolve
        run: |
          node -e "
          const fs = require('fs'), path = require('path');
          let bad = 0;
          const walk = (d) => fs.readdirSync(d).flatMap(f => {
            const p = path.join(d, f);
            return fs.statSync(p).isDirectory() ? walk(p) : (p.endsWith('.js') ? [p] : []);
          });
          for (const f of walk('functions')) {
            const src = fs.readFileSync(f, 'utf8');
            for (const m of src.matchAll(/from\s+['\"](\.[^'\"]+)['\"]/g)) {
              const target = path.resolve(path.dirname(f), m[1]);
              if (!fs.existsSync(target)) { console.error('BROKEN IMPORT in ' + f + ': ' + m[1]); bad++; }
            }
          }
          process.exit(bad ? 1 : 0);
          "
