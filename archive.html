<style>
  :root {
    --navy:#0a1628; --accent:#2563eb; --accent-light:#eff6ff;
    --text:#0f172a; --muted:#94a3b8; --border:#e2e8f0; --surface:#f8fafc;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--surface); }
  h1,h2,h3 { font-family: 'DM Serif Display', serif; }
  a { color: inherit; text-decoration: none; }

  /* NAV */
  nav { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .nav-logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--navy); display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-size: 0.9rem; font-weight: 500; color: #475569; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .nav-cta { background: var(--accent); color: white !important; padding: 7px 18px; border-radius: 8px; }
  /* account button — kept identical to the home page so the nav never shifts */
  .user-btn { display:flex;align-items:center;gap:8px;padding:7px 16px;border-radius:8px;font-size:0.85rem;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.2s; }
  .user-btn.login { background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe; }
  .user-btn.login:hover { background:#dbeafe; }
  .nav-toggle { display: none; background: none; border: none; cursor: pointer; flex-direction: column; justify-content: center; gap: 5px; width: 42px; height: 42px; padding: 9px; border-radius: 8px; }
  .nav-toggle:hover { background: var(--surface); }
  .nav-toggle span { display: block; width: 22px; height: 2px; border-radius: 2px; background: var(--text); transition: transform 0.28s ease, opacity 0.2s ease; }
  #site-nav.open .nav-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  #site-nav.open .nav-toggle span:nth-child(2) { opacity: 0; }
  #site-nav.open .nav-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* HEADER */
  .archive-header { background: var(--navy); padding: 3.5rem 2rem 3rem; }
  .archive-header-inner { max-width: 1200px; margin: 0 auto; }
  .archive-header h1 { font-size: 2.5rem; color: white; margin-bottom: 0.5rem; }
  .archive-header p { color: #94a3b8; font-size: 1rem; }
  .archive-stats { display: flex; gap: 2rem; margin-top: 1.5rem; flex-wrap: wrap; }
  .stat { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 0.75rem 1.25rem; }
  .stat .n { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: white; }
  .stat .l { font-size: 0.78rem; color: #64748b; margin-top: 2px; }

  /* CONTROLS */
  .controls { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 240px; position: relative; }
  .search-box input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; background: white; outline: none; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.85rem; }
  .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .pill { padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: white; color: #475569; transition: all 0.2s; }
  .pill.active, .pill:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .sort-select { padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; font-family: 'DM Sans', sans-serif; background: white; outline: none; cursor: pointer; color: #475569; }

  /* TIMELINE */
  .archive-main { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; }
  .date-group { margin-bottom: 2.5rem; }
  .date-label { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; }
  .date-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .articles-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 1rem; }
  .archive-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem; cursor: pointer; transition: all 0.2s; }
  .archive-card:hover { border-color: #93c5fd; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
  .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
  .source-badge { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
  .type-news  { background:#fff7ed; color:#c2410c; }
  .type-paper { background:#f0fdf4; color:#15803d; }
  .type-blog  { background:#eff6ff; color:#1d4ed8; }
  .card-time { font-size: 0.75rem; color: var(--muted); }
  .card-title { font-size: 0.92rem; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 0.4rem; }
  .card-desc { font-size: 0.8rem; color: #475569; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { margin-top: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
  .card-domain { font-size: 0.75rem; color: var(--muted); }
  .card-read { font-size: 0.78rem; color: var(--accent); font-weight: 500; }

  /* EMPTY */
  .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty .icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty h3 { font-size: 1.2rem; color: #475569; margin-bottom: 0.5rem; }

  /* LOAD MORE */
  .load-more-wrap { text-align: center; margin-top: 2rem; }
  .load-more-btn { background: none; border: 1px solid var(--border); padding: 10px 28px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; color: var(--accent); font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .load-more-btn:hover { background: var(--accent-light); }

  @media (max-width: 900px) {
    .nav-toggle { display: flex; }
    .nav-links {
      position: absolute; top: 64px; left: 0; right: 0;
      flex-direction: column; align-items: stretch; gap: 0;
      background: #ffffff; border-top: 1px solid var(--border);
      box-shadow: 0 18px 44px rgba(10,22,40,0.14);
      padding: 6px 0; margin: 0;
      max-height: 0; overflow: hidden; opacity: 0; pointer-events: none;
      transition: max-height 0.32s ease, opacity 0.22s ease;
    }
    #site-nav.open .nav-links { max-height: calc(100vh - 64px); overflow-y: auto; opacity: 1; pointer-events: auto; }
    .nav-links li { width: 100%; }
    .nav-links li a { display: block; padding: 14px 26px; font-size: 1rem; border-bottom: 1px solid var(--surface); }
    .nav-links li a:hover { background: var(--surface); }
    .nav-cta { display: block; text-align: center; margin: 12px 26px 8px; padding: 13px 20px !important; border-bottom: none !important; }
  }
  @media (max-width: 600px) {
    .archive-header h1 { font-size: 1.8rem; }
  }
</style>
</head>

<div class="archive-header">
  <div class="archive-header-inner">
    <h1>📚 Archive</h1>
    <p>Every article, paper and blog post seen on PromptAI — searchable, filterable, browsable by date.</p>
    <div class="archive-stats">
      <div class="stat"><div class="n" id="stat-total">0</div><div class="l">Total articles</div></div>
      <div class="stat"><div class="n" id="stat-sources">0</div><div class="l">Sources</div></div>
      <div class="stat"><div class="n" id="stat-days">0</div><div class="l">Days of history</div></div>
      <div class="stat"><div class="n" id="stat-today">0</div><div class="l">Added today</div></div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search articles, papers, blogs…" oninput="applyFilters()"/>
  </div>
  <div class="filter-group" id="type-filters">
    <button class="pill active" onclick="setType('all',this)">All Types</button>
    <button class="pill" onclick="setType('news',this)">📰 News</button>
    <button class="pill" onclick="setType('paper',this)">📄 Papers</button>
    <button class="pill" onclick="setType('blog',this)">✍️ Blog</button>
  </div>
  <div class="filter-group" id="source-filters"></div>
  <select class="sort-select" id="sort-select" onchange="applyFilters()">
    <option value="newest">Newest first</option>
    <option value="oldest">Oldest first</option>
    <option value="source">By source</option>
  </select>
  <select class="sort-select" id="jump-select" onchange="jumpToDate(this.value)" title="Jump to a date">
    <option value="">⤓ Jump to date…</option>
  </select>
</div>

<div class="archive-main">
  <div id="archive-content"></div>
  <div class="load-more-wrap">
    <button class="load-more-btn" id="load-more-archive" style="display:none" onclick="showMoreArchive()">Load more</button>
  </div>
</div>

<script>
// ── ARCHIVE STORAGE ────────────────────────────────────
const ARCHIVE_KEY = 'pai_archive';
const PAGE_SIZE = 30;
let archivePage = 0;
let currentType = 'all';
let currentSources = new Set();
let allArchive = [];
let filtered = [];

function loadArchive() {
  try {
    return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
  } catch(e) { return []; }
}

function saveArchive(items) {
  try {
    // Keep max 1000 items to avoid storage limits
    const trimmed = items.slice(0, 1000);
    localStorage.setItem(ARCHIVE_KEY, JSON.stringify(trimmed));
  } catch(e) {}
}

// ── HELPERS ────────────────────────────────────────────
function domainOf(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e) { return ''; }
}
function formatDate(ts) {
  if (!ts) return 'Unknown date';
  const d = new Date(ts);
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
}
function formatDateGroup(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yesterday = new Date(today - 86400000);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
function sourceBadge(src) {
  const map = {
    hn:'🟠 HN', arxiv:'📄 arXiv', tc:'📰 TechCrunch', mit:'🔬 MIT Tech Review',
    wired:'📡 Wired', deepmind:'🧬 DeepMind', openai:'🤖 OpenAI',
    gradient:'🎓 The Gradient', tds:'💻 TDS', aimagazine:'🏭 AI Magazine',
    analytics:'📊 Analytics', mitsloan:'🏛 MIT Sloan', blog:'✍️ Blog', paper:'📄 Paper'
  };
  return map[src] || src;
}
function typeClass(type) {
  return { news:'type-news', paper:'type-paper', blog:'type-blog' }[type] || 'type-news';
}

// ── RENDER ─────────────────────────────────────────────
function renderArchive(reset) {
  if (reset) { archivePage = 0; document.getElementById('archive-content').innerHTML = ''; }
  const slice = filtered.slice(archivePage * PAGE_SIZE, (archivePage + 1) * PAGE_SIZE);
  archivePage++;

  if (filtered.length === 0) {
    document.getElementById('archive-content').innerHTML = `
      <div class="empty">
        <div class="icon">📭</div>
        <h3>No articles found</h3>
        <p>Visit the <a href="/" style="color:#2563eb;">home page</a> to load fresh content — it gets archived automatically.</p>
      </div>`;
    document.getElementById('load-more-archive').style.display = 'none';
    return;
  }

  // Group by date
  const groups = {};
  slice.forEach(item => {
    const key = formatDateGroup(item.savedAt || item.ts || Date.now());
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  const container = document.getElementById('archive-content');
  Object.entries(groups).forEach(([date, items]) => {
    const group = document.createElement('div');
    group.className = 'date-group';
    group.dataset.date = date;
    group.id = 'dg-' + date.replace(/[^a-z0-9]/gi, '');
    group.innerHTML = `<div class="date-label">${date} <span style="color:#94a3b8;font-weight:400;font-size:0.72rem;">(${items.length} articles)</span></div>
      <div class="articles-row" id="row-${date.replace(/\s/g,'_')}"></div>`;
    container.appendChild(group);
    const row = group.querySelector('.articles-row');
    items.forEach(item => row.appendChild(renderCard(item)));
  });

  document.getElementById('load-more-archive').style.display =
    filtered.length > archivePage * PAGE_SIZE ? 'inline-block' : 'none';
}

function renderCard(item) {
  const card = document.createElement('div');
  card.className = 'archive-card';
  card.innerHTML = `
    <div class="card-top">
      <span class="source-badge ${typeClass(item.type)}">${sourceBadge(item.src)}</span>
      <span class="card-time">${formatDate(item.savedAt)}</span>
    </div>
    <div class="card-title">${item.title}</div>
    ${item.desc ? `<div class="card-desc">${item.desc}</div>` : ''}
    <div class="card-footer">
      <span class="card-domain">${domainOf(item.url)}</span>
      <span class="card-read">Read →</span>
    </div>`;
  card.onclick = () => window.open(item.url, '_blank', 'noopener');
  return card;
}

// ── FILTERS ────────────────────────────────────────────
function applyFilters() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const sort  = document.getElementById('sort-select').value;

  filtered = allArchive.filter(item => {
    if (currentType !== 'all' && item.type !== currentType) return false;
    if (currentSources.size > 0 && !currentSources.has(item.src)) return false;
    if (query && !item.title.toLowerCase().includes(query) && !(item.desc||'').toLowerCase().includes(query)) return false;
    return true;
  });

  if (sort === 'newest') filtered.sort((a,b) => (b.savedAt||0) - (a.savedAt||0));
  else if (sort === 'oldest') filtered.sort((a,b) => (a.savedAt||0) - (b.savedAt||0));
  else if (sort === 'source') filtered.sort((a,b) => (a.src||'').localeCompare(b.src||''));

  renderArchive(true);
  populateJump();
}

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('#type-filters .pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function buildSourceFilters() {
  const sources = [...new Set(allArchive.map(a => a.src))].filter(Boolean);
  const container = document.getElementById('source-filters');
  container.innerHTML = '';
  sources.forEach(src => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.textContent = sourceBadge(src);
    btn.onclick = () => {
      if (currentSources.has(src)) { currentSources.delete(src); btn.classList.remove('active'); }
      else { currentSources.add(src); btn.classList.add('active'); }
      applyFilters();
    };
    container.appendChild(btn);
  });
}

function showMoreArchive() { renderArchive(false); }

// ── JUMP TO DATE ("move to a particular news") ──────────
function populateJump() {
  const sel = document.getElementById('jump-select');
  if (!sel) return;
  const seen = new Set();
  const labels = [];
  filtered.forEach(item => {
    const lbl = formatDateGroup(item.savedAt || item.ts || Date.now());
    if (!seen.has(lbl)) { seen.add(lbl); labels.push(lbl); }
  });
  sel.innerHTML = '<option value="">⤓ Jump to date…</option>' +
    labels.map(l => `<option value="${l.replace(/"/g,'')}">${l}</option>`).join('');
}

function jumpToDate(label) {
  if (!label) return;
  const id = 'dg-' + label.replace(/[^a-z0-9]/gi, '');
  let guard = 0;
  // The list is paginated — keep loading until the target group is rendered.
  while (!document.getElementById(id) &&
         filtered.length > archivePage * PAGE_SIZE && guard++ < 60) {
    renderArchive(false);
  }
  const el = document.getElementById(id);
  if (el) {
    const y = el.getBoundingClientRect().top + window.pageYOffset - 80;
    window.scrollTo({ top: y, behavior: 'smooth' });
    el.querySelector('.date-label')?.animate(
      [{ color: '#2563eb' }, { color: '#0f172a' }], { duration: 1200 });
  }
}


// ── STATS ──────────────────────────────────────────────
function updateStats() {
  const today = new Date().toDateString();
  const todayCount = allArchive.filter(a => new Date(a.savedAt).toDateString() === today).length;
  const days = new Set(allArchive.map(a => new Date(a.savedAt||0).toDateString())).size;
  const sources = new Set(allArchive.map(a => a.src).filter(Boolean)).size;
  document.getElementById('stat-total').textContent   = allArchive.length;
  document.getElementById('stat-sources').textContent = sources;
  document.getElementById('stat-days').textContent    = days;
  document.getElementById('stat-today').textContent   = todayCount;
}

// ── INIT ───────────────────────────────────────────────
allArchive = loadArchive();
filtered   = [...allArchive].sort((a,b) => (b.savedAt||0) - (a.savedAt||0));
updateStats();
buildSourceFilters();
renderArchive(true);
populateJump();

// Pull the SHARED archive from the server (same on every device) and merge it
// with whatever this browser saw locally. The server is the source of truth for
// the count, so it no longer jumps around (100+ → 33 …). Falls back to
// local-only when the backend isn't reachable (preview / not yet deployed).
async function fetchServerArchive() {
  try {
    const r = await fetch('/archive-data?limit=4000');
    const data = await r.json();
    if (data && !data.offline && Array.isArray(data.items)) return data.items;
  } catch (e) {}
  return null;
}
(async function syncServerArchive() {
  const server = await fetchServerArchive();
  if (!server || !server.length) return;
  const byUrl = new Map(server.map(i => [i.url, i]));
  allArchive.forEach(i => { if (i.url && !byUrl.has(i.url)) byUrl.set(i.url, i); });
  allArchive = [...byUrl.values()];
  saveArchive(allArchive); // refresh local cache to match the shared store
  // Re-apply current filters so the view + count reflect the shared archive
  if (typeof applyFilters === 'function') applyFilters();
  else { filtered = [...allArchive].sort((a,b)=>(b.savedAt||0)-(a.savedAt||0)); renderArchive(true); populateJump(); }
  updateStats();
})();

// ── nav account button (matches home; keeps the header identical) ──
function goAccount() {
  let s = null; try { s = JSON.parse(localStorage.getItem('pai_session_db') || 'null'); } catch(e) {}
  location.href = s ? '/' : '/#account';
}
(function initNavUser() {
  let s = null; try { s = JSON.parse(localStorage.getItem('pai_session_db') || 'null'); } catch(e) {}
  const btn = document.getElementById('nav-user-btn');
  const label = document.getElementById('nav-user-label');
  const icon = document.getElementById('nav-user-icon');
  if (!btn || !s) return;
  const _n = (s.name || s.email || '').trim();
  const _p = _n.split(/\s+/).filter(Boolean);
  const first = _p[0] || 'Account';
  const initials = (_p.length >= 2 ? (_p[0][0] + _p[1][0]) : _n.slice(0, 2)).toUpperCase();
  btn.className = 'user-btn';
  btn.style.cssText = "background:#fff;border:1.5px solid #e2e8f0;color:#0f172a;display:flex;align-items:center;gap:7px;padding:5px 12px 5px 5px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;";
  if (icon) icon.outerHTML = '<span style="width:26px;height:26px;border-radius:50%;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;">' + initials + '</span>';
  if (label) label.textContent = first;
})();

// ── Mobile menu ──
function toggleMobileNav() {
  const nav = document.getElementById('site-nav');
  const open = nav.classList.toggle('open');
  document.getElementById('nav-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
}
function closeMobileNav() {
  document.getElementById('site-nav').classList.remove('open');
  document.getElementById('nav-toggle').setAttribute('aria-expanded', 'false');
}
document.querySelectorAll('#nav-links a').forEach(a => a.addEventListener('click', closeMobileNav));
document.addEventListener('click', (e) => {
  const nav = document.getElementById('site-nav');
  if (nav.classList.contains('open') && !nav.contains(e.target)) closeMobileNav();
});
</script>
</body>
